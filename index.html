<!DOCTYPE html>
<html>
<head>
  <title>Academic Tracker</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial; background:#f1f5f9; margin:0; }
    .container { max-width:500px; margin:auto; padding:20px; }
    .card { background:white; padding:20px; margin:15px 0; border-radius:10px; }
    input, select, button { width:100%; padding:10px; margin:8px 0; }
    button { background:#2563eb; color:white; border:none; }
    .dashboard { display:none; }

    .alert { padding:10px; border-radius:8px; margin-top:10px; }
    .red { background:#fee2e2; }
    .yellow { background:#fef3c7; }
    .green { background:#dcfce7; }
  </style>
</head>

<body>

<div class="container">

<div id="authBox" class="card">
  <h2>Student System</h2>

  <select id="mode">
    <option value="login">Login</option>
    <option value="register">Register</option>
  </select>

  <select id="role">
    <option value="student">Student</option>
    <option value="teacher">Teacher</option>
  </select>

  <input id="enroll" placeholder="Enrollment Number">
  <input id="password" type="password" placeholder="Password">

  <button onclick="handleAuth()">Submit</button>
</div>

<div id="studentDash" class="dashboard">

  <div class="card">
    <h2>Attendance</h2>
    <div id="attendanceInfo"></div>
    <div id="alertBox"></div>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <h2>CIE Marks</h2>
    <div id="marks"></div>
  </div>

  <div class="card">
    <h2>Assignments</h2>
    <div id="assignments"></div>
  </div>

</div>

<div id="teacherDash" class="dashboard card">
  <h2>Teacher Panel</h2>

  <input id="studentId" placeholder="Student Enrollment">
  <input id="attended" placeholder="Attended">
  <input id="total" placeholder="Total">

  <button onclick="updateData()">Update</button>
</div>

</div>

<script>

const firebaseConfig = {
    apiKey: "AIzaSyClAUwbu43yi5Xjp2bD4igfXQ2fwXeKiiU",
    authDomain: "student-academic-tracker-924a1.firebaseapp.com",
    projectId: "student-academic-tracker-924a1",
    storageBucket: "student-academic-tracker-924a1.firebasestorage.app",
    messagingSenderId: "405973587486",
    appId: "1:405973587486:web:db250f4f414f01a4b5000f",
    measurementId: "G-SYEKZC0DCW"
  };

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const subjects = [
  "Physics","Mathematics 2","BEE",
  "Engineering Graphics","TRW","Design Thinking"
];

function handleAuth() {

  let mode = document.getElementById("mode").value;
  let role = document.getElementById("role").value;
  let id = document.getElementById("enroll").value.trim();
  let pass = document.getElementById("password").value.trim();

  if(!id || !pass) {
    alert("Enter details");
    return;
  }

  if(role === "teacher") {
    if(id==="teacher" && pass==="admin123") {
      document.getElementById("authBox").style.display="none";
      document.getElementById("teacherDash").style.display="block";
    } else alert("Invalid Teacher");
    return;
  }

  if(mode === "register") {

    db.collection("students").doc(id).get().then(docSnap => {

      if(docSnap.exists) {
        alert("Already registered!");
      } else {

        db.collection("students").doc(id).set({
          password: pass,
          attended: 0,
          total: 0,
          marks: [0,0,0,0,0,0],
          assignments: ["Pending","Pending","Pending","Pending","Pending","Pending"]
        });

        alert("Registered! Now login.");
      }
    });
  }

  if(mode === "login") {

    db.collection("students").doc(id).get().then(docSnap => {

      if(docSnap.exists && docSnap.data().password === pass) {
        document.getElementById("authBox").style.display="none";
        document.getElementById("studentDash").style.display="block";
        loadStudent(docSnap.data());
      } else alert("Invalid Login");
    });
  }
}

function loadStudent(data) {

  let percent = data.total === 0 ? 0 : (data.attended/data.total)*100;

  document.getElementById("attendanceInfo").innerHTML =
    percent.toFixed(2) + "% (" + data.attended + "/" + data.total + ")";

  let alertHTML="";
  if(percent < 65)
    alertHTML = `<div class="alert red">DC - Not allowed for exams</div>`;
  else if(percent < 75)
    alertHTML = `<div class="alert yellow">NC - Fine ₹500</div>`;
  else
    alertHTML = `<div class="alert green">Good</div>`;

  document.getElementById("alertBox").innerHTML = alertHTML;

  new Chart(document.getElementById("chart"), {
    type:"doughnut",
    data:{
      labels:["Present","Absent"],
      datasets:[{data:[data.attended,data.total-data.attended]}]
    }
  });

  let m="";
  subjects.forEach((s,i)=> m += s + ": " + data.marks[i] + "<br>");
  document.getElementById("marks").innerHTML = m;

  let a="";
  subjects.forEach((s,i)=> a += s + ": " + data.assignments[i] + "<br>");
  document.getElementById("assignments").innerHTML = a;
}

function updateData() {

  let id = document.getElementById("studentId").value;

  db.collection("students").doc(id).update({
    attended: Number(document.getElementById("attended").value),
    total: Number(document.getElementById("total").value)
  });

  alert("Updated!");
}

</script>

</body>
</html>
